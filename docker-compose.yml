# Local API + Postgres (optional). Copy server/api/.env.example → server/api/.env and adjust.
# Usage: docker compose up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hoppr
      POSTGRES_PASSWORD: hoppr
      POSTGRES_DB: hoppr
    ports:
      - "5432:5432"
    volumes:
      - hoppr_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoppr -d hoppr"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://hoppr:hoppr@db:5432/hoppr
    env_file:
      - path: server/api/.env
        required: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  hoppr_pg:
