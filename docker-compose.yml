# Local API + Postgres (optional). Copy server/api/.env.example → server/api/.env and adjust.
# Usage: docker compose up --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chainpass
      POSTGRES_PASSWORD: chainpass
      POSTGRES_DB: chainpass
    ports:
      - "5432:5432"
    volumes:
      - chainpass_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainpass -d chainpass"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://chainpass:chainpass@db:5432/chainpass
    env_file:
      - path: server/api/.env
        required: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  chainpass_pg:
