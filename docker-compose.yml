# Local API + Postgres (optional). Copy server/api/.env.example → server/api/.env and adjust.
# Usage: docker compose up --build
#
# Postgres credentials are parameterized so no literal password lives in this file.
# For zero-setup local dev, defaults below are fine; override via shell env or a
# root .env file (read automatically by docker compose) before running:
#
#   POSTGRES_USER=... POSTGRES_PASSWORD=... POSTGRES_DB=... docker compose up
#
# Never use these defaults in a shared / publicly-reachable environment.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hoppr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hoppr}
      POSTGRES_DB: ${POSTGRES_DB:-hoppr}
    ports:
      - "5432:5432"
    volumes:
      - hoppr_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hoppr} -d ${POSTGRES_DB:-hoppr}"]
      interval: 3s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-hoppr}:${POSTGRES_PASSWORD:-hoppr}@db:5432/${POSTGRES_DB:-hoppr}
    env_file:
      - path: server/api/.env
        required: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  hoppr_pg:
